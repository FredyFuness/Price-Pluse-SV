<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Pulse SV - Comparador de Precios</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    #map {
      height: 80vh;
      width: 100%;
    }

    .info {
      padding: 15px;
      background: #ecf0f1;
      text-align: center;
      font-size: 16px;
      color: #34495e;
    }

    /* Estilo para los popups del mapa */
    .leaflet-popup-content-wrapper {
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>
  🛒 Price Pulse SV - San Miguel
</header>

<div id="map"></div>

<div class="info">
  📍 Toca una tienda para ver precios de productos básicos
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="script.js"></script>

</body>
</html>
